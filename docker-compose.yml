services:
  mongo:
    image: mongo:7
    container_name: study-abroad-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-abroad-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/waygood-evaluation
      JWT_SECRET: dev-secret
      JWT_EXPIRES_IN: 1d
      CACHE_TTL_SECONDS: 300
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: study-abroad-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mongo_data:
